<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gold Rounded Badge</title>
  <style>
    :root {
      --badge-size: min(74vmin, 270px);
      --badge-radius: calc(var(--badge-size) * 0.215);
      --groove-inset: calc(var(--badge-size) * 0.040);
      --groove-radius: calc(var(--badge-radius) * 0.78);
      --tile-size: 26px;
      --cream: #ffe7b0;
      --cream-light: #fff2cc;
      --gold: #dca554;
      --gold-deep: #bc7f2f;
      --pill-width: min(82vmin, 292px);
      --pill-height: calc(var(--pill-width) * 0.345);
      --pill-edge: calc(var(--pill-height) * 0.5);
      --coin-size: calc(var(--pill-height) * 0.66);
      --plus-size: calc(var(--pill-height) * 0.62);
      --plus-offset-x: 0px;
      --plus-offset-y: 0px;
      --plus-radius-scale: 0.28;
      --plus-shine: 0.32;
      --plus-stroke: 0.018;
      --plus-font-scale: 0.70;
      --plus-button-scale: 1;
      --plus-round-scale: 0.08;
      --plus-hue: 65;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: #3d2a13;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    .checkerboard {
      background-color: #ffffff;
      background-image:
        conic-gradient(
          from 90deg,
          #efefef 25%,
          #ffffff 0 50%,
          #efefef 0 75%,
          #ffffff 0
        );
      background-position: 0 0;
      background-size: var(--tile-size) var(--tile-size);
    }

    .stage {
      display: flex;
      width: 100%;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 34px;
    }

    .demo-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .badge {
      position: relative;
      width: var(--badge-size);
      aspect-ratio: 1;
      border: 1px solid rgba(189, 121, 38, 0.35);
      border-radius: var(--badge-radius);
      background:
        radial-gradient(
          circle at 35% 23%,
          rgba(255, 250, 222, 0.92) 0 18%,
          rgba(255, 236, 186, 0.66) 35%,
          rgba(255, 229, 166, 0) 64%
        ),
        linear-gradient(138deg, #ffefc7 0%, var(--cream) 47%, #f6c974 100%);
      box-shadow:
        0 2px 1px rgba(255, 255, 255, 0.82) inset,
        0 -3px 5px rgba(173, 103, 22, 0.12) inset,
        0 8px 16px rgba(136, 89, 30, 0.22);
    }

    .badge::before,
    .badge::after {
      position: absolute;
      pointer-events: none;
      content: "";
    }

    .badge::before {
      inset: var(--groove-inset);
      border: 1px solid rgba(181, 116, 35, 0.50);
      border-radius: var(--groove-radius);
      box-shadow:
        0 1px 1px rgba(255, 255, 255, 0.88),
        0 -2px 3px rgba(255, 255, 255, 0.78) inset,
        0 3px 6px rgba(117, 66, 17, 0.30) inset;
    }

    .badge::after {
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.48) 0%,
          rgba(255, 255, 255, 0.1) 34%,
          rgba(183, 105, 28, 0.07) 100%
        ),
        radial-gradient(
          circle at 73% 79%,
          rgba(183, 105, 28, 0.11) 0 10%,
          rgba(183, 105, 28, 0) 38%
        );
      mix-blend-mode: soft-light;
    }

    .coin-pill {
      position: relative;
      isolation: isolate;
      display: flex;
      align-items: center;
      width: var(--pill-width);
      height: var(--pill-height);
      padding: calc(var(--pill-height) * 0.12) calc(var(--pill-height) * 0.19);
      border: 1px solid rgba(151, 104, 31, 0.32);
      border-radius: var(--pill-edge);
      background:
        radial-gradient(
          ellipse at 48% 12%,
          rgba(255, 255, 245, 0.96) 0 16%,
          rgba(255, 245, 207, 0.64) 43%,
          rgba(255, 232, 172, 0) 70%
        ),
        linear-gradient(180deg, #fff4ca 0%, #fde4a8 56%, #efc56d 100%);
      box-shadow:
        0 3px 1px rgba(255, 255, 255, 0.82) inset,
        0 -4px 6px rgba(149, 91, 22, 0.18) inset,
        0 2px 3px rgba(105, 69, 24, 0.20),
        0 10px 18px rgba(73, 93, 97, 0.30);
    }

    .coin-pill::before,
    .coin-pill::after {
      position: absolute;
      pointer-events: none;
      content: "";
    }

    .coin-pill::before {
      z-index: 0;
      inset: calc(var(--pill-height) * 0.075);
      border: 1px solid rgba(161, 107, 28, 0.45);
      border-radius: inherit;
      box-shadow:
        0 1px 1px rgba(255, 255, 255, 0.86),
        0 2px 5px rgba(129, 77, 18, 0.28) inset,
        0 -2px 3px rgba(255, 255, 255, 0.62) inset;
    }

    .coin-pill::after {
      z-index: 0;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.36) 0%,
          rgba(255, 255, 255, 0.06) 47%,
          rgba(147, 83, 23, 0.08) 100%
        );
      mix-blend-mode: soft-light;
    }

    .coin-face,
    .plus-button,
    .pill-value {
      position: relative;
      z-index: 1;
    }

    .coin-face,
    .plus-button {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 50%;
    }

    .coin-face {
      width: var(--coin-size);
      height: var(--coin-size);
      border: 1px solid #a75f10;
      background:
        radial-gradient(circle at 36% 24%, #fff06d 0 12%, rgba(255, 240, 109, 0) 31%),
        radial-gradient(circle at 52% 54%, #ffc83d 0 45%, #ee9d18 72%, #c56d11 100%);
      box-shadow:
        0 0 0 calc(var(--coin-size) * 0.075) #f5ad1a inset,
        0 0 0 calc(var(--coin-size) * 0.145) rgba(142, 77, 10, 0.35) inset,
        0 1px 2px rgba(255, 255, 255, 0.82) inset,
        0 -3px 4px rgba(117, 63, 9, 0.30) inset,
        0 2px 4px rgba(79, 49, 17, 0.44);
    }

    .coin-face::before {
      position: absolute;
      inset: calc(var(--coin-size) * 0.17);
      border: 1px solid rgba(156, 87, 8, 0.42);
      border-radius: 50%;
      box-shadow:
        0 1px 2px rgba(255, 246, 148, 0.88),
        0 -1px 2px rgba(118, 66, 8, 0.25) inset;
      content: "";
    }

    .coin-star {
      position: relative;
      z-index: 1;
      width: calc(var(--coin-size) * 0.46);
      height: calc(var(--coin-size) * 0.46);
      background: linear-gradient(180deg, #ffe76f 0%, #ffc93e 56%, #eb9017 100%);
      clip-path: polygon(
        50% 0%,
        61% 33%,
        96% 34%,
        68% 54%,
        79% 88%,
        50% 67%,
        21% 88%,
        32% 54%,
        4% 34%,
        39% 33%
      );
      filter:
        drop-shadow(0 1px 0 rgba(255, 248, 147, 0.72))
        drop-shadow(0 2px 1px rgba(117, 65, 8, 0.38));
    }

    .pill-value {
      flex: 1 1 auto;
      min-width: 0;
      color: #3a1c12;
      font-size: calc(var(--pill-height) * 0.30);
      font-weight: 850;
      line-height: 1;
      text-align: center;
      text-shadow:
        0 1px 0 rgba(255, 246, 205, 0.72),
        0 2px 1px rgba(114, 70, 22, 0.15);
    }

    .plus-button {
      width: calc(var(--plus-size) * 1.03 * var(--plus-button-scale));
      height: calc(var(--plus-size) * 0.90 * var(--plus-button-scale));
      border: 1px solid rgba(83, 91, 35, 0.72);
      border-radius: calc(var(--plus-size) * var(--plus-radius-scale) * var(--plus-button-scale));
      background:
        linear-gradient(
          180deg,
          hsl(var(--plus-hue) 39% 44%) 0%,
          hsl(var(--plus-hue) 42% 40%) 100%
        );
      box-shadow:
        0 1px 1px rgba(255, 255, 255, var(--plus-shine)) inset,
        0 -1px 2px rgba(43, 56, 18, 0.16) inset,
        0 2px 3px rgba(55, 53, 22, 0.36);
    }

    .plus-mark {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      border-radius: calc(var(--plus-size) * var(--plus-round-scale));
      color: #fff6c7;
      font-family: "Arial Rounded MT Bold", ui-rounded, system-ui, sans-serif;
      font-size: calc(var(--plus-size) * var(--plus-font-scale));
      font-weight: 900;
      line-height: 0.82;
      text-align: center;
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.46),
        0 1px 1px rgba(42, 55, 17, 0.32);
      transform: translate(var(--plus-offset-x), var(--plus-offset-y));
      -webkit-text-stroke: calc(var(--plus-size) * var(--plus-stroke)) rgba(62, 73, 23, 0.54);
    }

    .controls {
      display: grid;
      width: min(92vmin, 430px);
      gap: 10px;
      padding: 14px 16px;
      border: 1px solid rgba(126, 92, 31, 0.24);
      border-radius: 8px;
      background: rgba(255, 242, 204, 0.86);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.76) inset,
        0 6px 14px rgba(101, 78, 33, 0.16);
    }

    .control-row {
      display: grid;
      grid-template-columns: 78px 1fr 44px;
      align-items: center;
      gap: 12px;
      color: #442713;
      font-size: 12px;
      font-weight: 750;
    }

    .control-row output {
      color: #65421d;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .control-row input {
      width: 100%;
      accent-color: #8c913b;
    }

    @media (max-width: 420px) {
      .stage {
        padding: 24px 14px;
      }

      .control-row {
        grid-template-columns: 64px 1fr 38px;
      }
    }
  </style>
</head>
<body class="checkerboard">
  <main class="stage" aria-label="CSS drawings of a gold rounded square badge and currency pill">
    <div class="demo-stack">
      <div class="badge" role="img" aria-label="Soft gold rounded square badge"></div>
      <div class="coin-pill" role="img" aria-label="Cream game currency pill with a gold star coin, value 2,450, and green plus button">
        <div class="coin-face" aria-hidden="true">
          <span class="coin-star"></span>
        </div>
        <span class="pill-value">2,450</span>
        <div class="plus-button" aria-hidden="true">
          <span class="plus-mark">+</span>
        </div>
      </div>
      <form class="controls" data-control-panel aria-label="Plus button controls">
        <label class="control-row">
          <span>X</span>
          <input type="range" min="-6" max="6" step="0.25" value="0" data-css-var="--plus-offset-x" data-unit="px">
          <output>0px</output>
        </label>
        <label class="control-row">
          <span>Y</span>
          <input type="range" min="-6" max="6" step="0.25" value="0" data-css-var="--plus-offset-y" data-unit="px">
          <output>0px</output>
        </label>
        <label class="control-row">
          <span>Radius</span>
          <input type="range" min="0.12" max="0.44" step="0.01" value="0.28" data-css-var="--plus-radius-scale">
          <output>0.28</output>
        </label>
        <label class="control-row">
          <span>Shine</span>
          <input type="range" min="0" max="0.60" step="0.01" value="0.32" data-css-var="--plus-shine">
          <output>0.32</output>
        </label>
        <label class="control-row">
          <span>Stroke</span>
          <input type="range" min="0" max="0.05" step="0.001" value="0.018" data-css-var="--plus-stroke">
          <output>0.018</output>
        </label>
        <label class="control-row">
          <span>Plus</span>
          <input type="range" min="0.58" max="0.82" step="0.01" value="0.70" data-css-var="--plus-font-scale">
          <output>0.70</output>
        </label>
        <label class="control-row">
          <span>Button</span>
          <input type="range" min="0.75" max="1.35" step="0.01" value="1" data-css-var="--plus-button-scale">
          <output>1</output>
        </label>
        <label class="control-row">
          <span>Round</span>
          <input type="range" min="0" max="0.18" step="0.01" value="0.08" data-css-var="--plus-round-scale">
          <output>0.08</output>
        </label>
        <label class="control-row">
          <span>Hue</span>
          <input type="range" min="55" max="82" step="1" value="65" data-css-var="--plus-hue">
          <output>65</output>
        </label>
      </form>
    </div>
  </main>
  <script>
    const controls = document.querySelectorAll("[data-css-var]");

    for (const control of controls) {
      const output = control.closest(".control-row").querySelector("output");
      const unit = control.dataset.unit || "";
      const update = () => {
        const value = `${control.value}${unit}`;
        document.documentElement.style.setProperty(control.dataset.cssVar, value);
        output.value = value;
        output.textContent = value;
      };

      control.addEventListener("input", update);
      update();
    }
  </script>
</body>
</html>
